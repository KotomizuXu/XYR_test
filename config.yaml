api:
  base_url: "https://open.bigmodel.cn/api/anthropic"
  auth_token_env: "GLM_API_TOKEN"
  model: "glm-5.1"
  max_tokens: 131072
  temperature: 0.7
  timeout: 300

novel:
  default_chapters: 20
  words_per_chapter:
    min: 3000
    max: 5000
  review_max_retries: 2  # review-rewrite 循环硬上限（默认 2 轮已能覆盖 90% 修复场景，降低 token 消耗）
  summary_max_length: 800
  volume_summary_max_length: 1200  # 卷级摘要字数上限（Level 3 宏观摘要）
  volume_summary_min_chapters: 3   # 至少累计 N 章才生成卷级摘要

# 上下文预算（防 max_tokens 截断）：单位字符数，中文 ≈ 1.5 token/字
# 总预算 = api.max_tokens / 1.5 ≈ 87000 字（GLM-5.1 131K window）
context_budget:
  reserved_output_chars: 9000      # 章节输出预留（5000 字正文 + 续写余地）
  writer_system_chars: 40000       # Writer system prompt 上限（含 constitution + style）
  running_context_chars: 50000     # build_running_context 总预算（user 侧）
  tracking_context_chars: 8000     # tracker.get_tracking_context 输出上限
  rewrite_ctx_cap: 8000            # writer.rewrite 时传入的精简上下文上限
  continuation_tail_chars: 2000    # _continue_text 续写时只回传草稿尾部 N 字
  recent_chapters_full: 3          # Tier 1：最近 N 章原文片段
  recent_chapters_condensed: 7     # Tier 2：再向前 N 章一句话摘要
  foreshadowing_top_k: 8           # 检索注入的相关伏笔/锚点数量

agents:
  style_advisor:
    temperature: 0.5
  director:
    temperature: 0.8
  plotter:
    temperature: 0.7
  writer:
    temperature: 0.85
  editor:
    temperature: 0.5
  reviewer:
    temperature: 0.3
  critic:
    temperature: 0.5
  capability_extractor:
    temperature: 0.5
  outline_auditor:
    temperature: 0.3
  outline_global_checker:
    temperature: 0.3

# 大纲审计配置（Plotting 阶段 Engine A→D）
outline_audit:
  batch_size: 5                 # 每批审计章节数（默认复用 Plotter BATCH_SIZE）
  audit_max_retries: 2           # Engine B+C 审核不通过时最多重试次数（从1提升到2，给重写循环更多机会）
  stale_similarity_threshold: 0.92  # 相似度检测阈值（>0.92 判定为 stale，触发升温重写）
  auto_rewrite: true             # true=自动重写不通过章节；false=只展示审计结果不自动重写
  plotter_rewrite_ctx_cap: 10000 # 重写时摘要上下文上限（常规生成时 20000，重写时降低以留出更多 token 给审计反馈）
  rewrite_temperature_boost: 0.25 # 重写温度提升量（基础温度 +0.25，上限 0.95）
  default_capability_score:      # Engine A: 未明确设定时的默认能力分
    protagonist: 5
    supporting: 4
    minor: 3
  quality_threshold:             # Engine C: 5维评分打回阈值
    total_max: 50                # 5维×10分
    reject_below: 35             # <35 必须打回
    conditional_pass: 42         # 35-42 条件通过
  pacing_rules:                  # Engine D2: 节奏检测规则
    max_consecutive_high: 3      # 连续高张力章节上限
    max_consecutive_low: 3       # 连续低张力章节上限
    max_same_emotion: 4          # 连续相同情绪类型上限
  forgotten_check: true          # Engine D1: 是否启用遗忘曲线检测（阈值复用 style_guide.suggestions.tracking_thresholds）

# 题材 → 审核严格度映射（key 为题材关键词，value 为 strict/flexible）
genre_strictness:
  strict: ["悬疑", "推理", "历史", "严肃", "科幻"]
  flexible: ["爽文", "复仇", "言情", "甜文", "虐文", "网文", "玄幻", "仙侠", "武侠", "奇幻", "都市"]
